<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Lab: Factors Affecting Resistance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .wire-container {
            perspective: 1000px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 2px inset #cbd5e1;
        }
        .wire-3d {
            transition: all 0.2s ease-out;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 2px 5px rgba(255,255,255,0.5);
            border-radius: 4px;
            position: relative;
        }
        .electron {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #60a5fa;
            border-radius: 50%;
            box-shadow: 0 0 5px #3b82f6;
            animation: move-right 2s linear infinite;
        }
        @keyframes move-right {
            from { left: 0%; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            to { left: 100%; opacity: 0; }
        }
        input[type=range] {
            cursor: grab;
        }
        input[type=range]:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Factors Affecting Resistance</h1>
            <p class="text-slate-600">Simulate $R = \rho \frac{l}{A}$ by interacting with the conductor below.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Panel: Controls -->
            <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-200 space-y-8">
                <!-- Material Selection -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Conductor Material (Resistivity $\rho$)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="updateMaterial('copper')" id="btn-copper" class="material-btn p-2 text-xs font-semibold rounded border bg-orange-100 border-orange-400 text-orange-800">Copper</button>
                        <button onclick="updateMaterial('gold')" id="btn-gold" class="material-btn p-2 text-xs font-semibold rounded border bg-slate-50 border-slate-300">Gold</button>
                        <button onclick="updateMaterial('aluminium')" id="btn-aluminium" class="material-btn p-2 text-xs font-semibold rounded border bg-slate-50 border-slate-300">Aluminium</button>
                        <button onclick="updateMaterial('tungsten')" id="btn-tungsten" class="material-btn p-2 text-xs font-semibold rounded border bg-slate-50 border-slate-300">Tungsten</button>
                    </div>
                </div>

                <!-- Length Slider -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-bold text-slate-700">Length ($l$)</label>
                        <span id="length-val" class="text-blue-600 font-mono">100 cm</span>
                    </div>
                    <input type="range" id="length-slider" min="10" max="200" value="100" class="w-full h-2 bg-slate-200 rounded-lg appearance-none">
                </div>

                <!-- SWG (Thickness) Slider -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-bold text-slate-700">Thickness (S.W.G.)</label>
                        <span id="swg-val" class="text-blue-600 font-mono">22 (0.71mm)</span>
                    </div>
                    <input type="range" id="swg-slider" min="14" max="32" value="22" step="2" class="w-full h-2 bg-slate-200 rounded-lg appearance-none">
                    <p class="text-[10px] text-slate-400 mt-1 italic">*Lower SWG means thicker wire</p>
                </div>

                <button onclick="logData()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition shadow-lg">
                    Add to Observation Log
                </button>
            </div>

            <!-- Middle Panel: Visualization -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Visual Box -->
                <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
                    <div class="wire-container relative" id="stage">
                        <div id="wire" class="wire-3d" style="width: 200px; height: 20px; background-color: #b87333;">
                            <!-- Electrons generated by JS -->
                        </div>
                    </div>
                    
                    <!-- Real-time formula -->
                    <div class="mt-6 flex flex-wrap justify-center items-center gap-4 text-lg md:text-2xl font-serif text-slate-700">
                        <div class="flex items-center">
                            <span class="font-bold text-indigo-600">R</span>
                            <span class="mx-2">=</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <span id="formula-rho" class="text-orange-600 text-sm">1.68e-8</span>
                            <div class="w-16 h-0.5 bg-slate-800 my-1"></div>
                            <span id="formula-area" class="text-green-600 text-sm">0.39mm²</span>
                        </div>
                        <div class="flex items-center">
                            <span class="mx-1">×</span>
                            <span id="formula-length" class="text-blue-600">1.0m</span>
                        </div>
                        <div class="flex items-center ml-4 border-l pl-4">
                            <span class="text-sm text-slate-400 mr-2">Result:</span>
                            <span id="result-r" class="font-mono font-bold text-3xl text-indigo-600">0.043 Ω</span>
                        </div>
                    </div>
                </div>

                <!-- Bottom Panel: Log -->
                <div class="bg-slate-800 p-6 rounded-2xl shadow-xl text-white">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                            Observation Log
                        </h3>
                        <button onclick="clearLog()" class="text-xs text-slate-400 hover:text-white uppercase tracking-wider">Clear All</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-slate-400 border-b border-slate-700">
                                    <th class="pb-2 px-2 font-medium">Material</th>
                                    <th class="pb-2 px-2 font-medium">Length (m)</th>
                                    <th class="pb-2 px-2 font-medium">SWG</th>
                                    <th class="pb-2 px-2 font-medium">Resistance (Ω)</th>
                                </tr>
                            </thead>
                            <tbody id="log-body">
                                <!-- Data rows added here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data Definitions
        const materials = {
            copper: { name: 'Copper', rho: 1.68e-8, color: '#b87333' },
            gold: { name: 'Gold', rho: 2.44e-8, color: '#ffd700' },
            aluminium: { name: 'Aluminium', rho: 2.65e-8, color: '#a5a9b4' },
            tungsten: { name: 'Tungsten', rho: 5.60e-8, color: '#4a4e69' }
        };

        // SWG Mapping (Standard Wire Gauge to diameter in mm)
        const swgData = {
            14: 2.03, 16: 1.63, 18: 1.22, 20: 0.91, 
            22: 0.71, 24: 0.56, 26: 0.46, 28: 0.38, 
            30: 0.32, 32: 0.27
        };

        // State Variables
        let currentMaterial = 'copper';
        const lengthSlider = document.getElementById('length-slider');
        const swgSlider = document.getElementById('swg-slider');
        const wire = document.getElementById('wire');
        const logBody = document.getElementById('log-body');

        function updateMaterial(key) {
            currentMaterial = key;
            document.querySelectorAll('.material-btn').forEach(btn => {
                btn.classList.remove('bg-orange-100', 'border-orange-400', 'text-orange-800', 'bg-indigo-100', 'border-indigo-400', 'text-indigo-800');
                btn.classList.add('bg-slate-50', 'border-slate-300', 'text-slate-700');
            });
            const activeBtn = document.getElementById(`btn-${key}`);
            activeBtn.classList.remove('bg-slate-50', 'border-slate-300');
            activeBtn.classList.add('bg-indigo-100', 'border-indigo-400', 'text-indigo-800');
            
            calculate();
        }

        function calculate() {
            const lengthCm = parseFloat(lengthSlider.value);
            const swg = parseInt(swgSlider.value);
            const diameterMm = swgData[swg];
            
            // Physical Calcs
            const lengthM = lengthCm / 100;
            const radiusM = (diameterMm / 1000) / 2;
            const areaM2 = Math.PI * Math.pow(radiusM, 2);
            const rho = materials[currentMaterial].rho;
            
            const resistance = (rho * lengthM) / areaM2;

            // Update UI Labels
            document.getElementById('length-val').innerText = `${lengthCm} cm`;
            document.getElementById('swg-val').innerText = `${swg} (${diameterMm}mm)`;
            document.getElementById('formula-rho').innerText = rho.toExponential(2);
            document.getElementById('formula-length').innerText = `${lengthM.toFixed(1)}m`;
            document.getElementById('formula-area').innerText = `${(areaM2 * 1e6).toFixed(3)}mm²`;
            document.getElementById('result-r').innerText = `${resistance.toFixed(4)} Ω`;

            // Update 3D Wire
            wire.style.width = `${lengthCm * 2}px`; // Scale for visibility
            wire.style.height = `${diameterMm * 20}px`; // Exaggerated thickness
            wire.style.backgroundColor = materials[currentMaterial].color;

            // Manage Electrons
            updateElectrons(resistance);
        }

        function updateElectrons(resistance) {
            // High resistance = slower or fewer visible electrons (symbolic)
            const count = 5;
            wire.innerHTML = '';
            // Speed calculation: higher R = slower speed
            const duration = Math.min(Math.max(0.5 + (resistance * 20), 0.5), 5);
            
            for(let i=0; i<count; i++) {
                const e = document.createElement('div');
                e.className = 'electron';
                e.style.top = `${Math.random() * 80 + 10}%`;
                e.style.animationDuration = `${duration}s`;
                e.style.animationDelay = `${Math.random() * 2}s`;
                wire.appendChild(e);
            }
        }

        function logData() {
            const row = document.createElement('tr');
            row.className = 'border-b border-slate-700 hover:bg-slate-700/50 transition';
            
            const l = (lengthSlider.value / 100).toFixed(2);
            const swg = swgSlider.value;
            const r = document.getElementById('result-r').innerText;
            
            row.innerHTML = `
                <td class="py-3 px-2 font-semibold text-indigo-300">${materials[currentMaterial].name}</td>
                <td class="py-3 px-2">${l}</td>
                <td class="py-3 px-2">${swg}</td>
                <td class="py-3 px-2 font-mono text-green-400">${r}</td>
            `;
            
            logBody.prepend(row);
        }

        function clearLog() {
            logBody.innerHTML = '';
        }

        // Listeners
        lengthSlider.oninput = calculate;
        swgSlider.oninput = calculate;

        // Init
        window.onload = () => {
            updateMaterial('copper');
        };
    </script>
</body>
</html>

```
